<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | THE SOVEREIGN</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family:'Manrope',sans-serif; background:#fff9f0; color:#1d1b16; }
    .serif { font-family:'Noto Serif',serif; }
    .gold-gradient { background: linear-gradient(135deg, #8f4e00 0%, #ff9933 100%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <main class="w-full max-w-6xl grid md:grid-cols-2 gap-6">
    <section class="bg-white border border-orange-100 rounded-lg p-8 shadow-sm">
      <p class="text-xs uppercase tracking-[0.3em] text-orange-900 mb-2">The Sovereign Access</p>
      <h1 class="serif text-4xl italic mb-6">Login</h1>
      <form id="loginForm" class="space-y-4">
        <input name="email" type="email" required placeholder="Email" class="w-full border border-orange-200 rounded px-4 py-3 bg-white" />
        <input name="password" type="password" required placeholder="Password" class="w-full border border-orange-200 rounded px-4 py-3 bg-white" />
        <button class="w-full gold-gradient text-white py-3 rounded uppercase tracking-widest text-xs">Sign In</button>
      </form>
      <p id="messageBox" class="mt-4 text-sm text-stone-600"></p>
    </section>

    <section class="bg-white border border-orange-100 rounded-lg p-8 shadow-sm">
      <p class="text-xs uppercase tracking-[0.3em] text-orange-900 mb-2">New account</p>
      <h2 class="serif text-4xl italic mb-6">Register</h2>
      <form id="signupForm" class="space-y-4">
        <input name="full_name" type="text" required placeholder="Full Name" class="w-full border border-orange-200 rounded px-4 py-3 bg-white" />
        <input name="email" type="email" required placeholder="Email" class="w-full border border-orange-200 rounded px-4 py-3 bg-white" />
        <input name="password" type="password" required placeholder="Password" class="w-full border border-orange-200 rounded px-4 py-3 bg-white" />
        <select name="role" class="w-full border border-orange-200 rounded px-4 py-3 bg-white">
          <option value="customer">Customer</option>
          <option value="admin">Admin Request</option>
        </select>
        <button class="w-full border border-orange-300 text-orange-900 py-3 rounded uppercase tracking-widest text-xs">Create Account</button>
      </form>
      <p class="text-xs text-stone-500 mt-4">Admin role goes through approval based on your Supabase policies.</p>
      <a href="index.html" class="inline-block mt-4 text-xs uppercase tracking-widest border-b border-orange-300 text-orange-900">Back to Store</a>
    </section>
  </main>

  <script src="js/supabase-config.js"></script>
  <script type="module" src="js/login-page.js"></script>
</body>
</html>
